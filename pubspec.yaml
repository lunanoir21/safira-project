name: safira
description: A secure, offline-first, open-source password manager built with Flutter.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.1

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # Encryption & Security
  pointycastle: ^3.9.1
  cryptography: ^2.7.0
  argon2: ^0.3.0
  convert: ^3.1.1

  # Biometric Auth
  local_auth: ^2.3.0

  # TOTP
  otp: ^3.1.3
  base32: ^2.1.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.0

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # HTTP (HaveIBeenPwned)
  http: ^1.2.1
  dio: ^5.4.3+1

  # File handling
  file_picker: ^8.0.7
  path: ^1.9.0
  share_plus: ^9.0.0

  # Clipboard
  flutter_clipboard_manager: ^0.0.2
  super_clipboard: ^0.8.17

  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  google_fonts: ^6.2.1
  flex_color_scheme: ^7.3.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  gap: ^3.0.1
  badges: ^3.1.2

  # Forms & Validation
  reactive_forms: ^17.0.1
  form_validator: ^2.1.1

  # Utilities
  uuid: ^4.4.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  collection: ^1.18.0
  intl: ^0.19.0
  logger: ^2.3.0
  fuzzywuzzy: ^1.1.0

  # Import/Export
  xml: ^6.5.0
  csv: ^6.0.0

  # Linux desktop
  window_manager: ^0.3.9
  hotkey_manager: ^0.2.3
  bitsdojo_window: ^0.1.6

  # Notifications
  flutter_local_notifications: ^17.2.1+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  isar_generator: ^3.1.0+1
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  # Linting
  flutter_lints: ^4.0.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

  # Testing
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0
  fake_async: ^1.3.1

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/icons/
    - assets/images/

  fonts:
    - family: SafiraIcons
      fonts:
        - asset: assets/fonts/SafiraIcons.ttf
