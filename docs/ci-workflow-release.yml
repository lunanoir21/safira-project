# ⚠️ Copy this file to: .github/workflows/release.yml
# Triggers on git tag push (e.g. git tag v1.0.0 && git push --tags)

name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  FLUTTER_VERSION: "3.19.6"

jobs:
  release-android:
    name: Release Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --release --split-per-abi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

  release-linux:
    name: Release Linux Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -y && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux --release
      - name: Bundle Linux release
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../safira-linux-${{ github.ref_name }}.tar.gz .
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: safira-linux-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
